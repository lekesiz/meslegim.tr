name: Dependency Updates

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  update-dependencies:
    name: Update Dependencies
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for outdated dependencies
        id: outdated
        run: |
          pnpm outdated --format json > outdated.json 2>&1 || true
          if [ -s outdated.json ] && grep -q '"name"' outdated.json 2>/dev/null; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
          fi

      - name: Update dependencies (patch & minor)
        if: steps.outdated.outputs.has_updates == 'true'
        run: |
          pnpm update --latest --interactive=false

      - name: Install updated dependencies
        if: steps.outdated.outputs.has_updates == 'true'
        run: pnpm install

      - name: Run type check
        if: steps.outdated.outputs.has_updates == 'true'
        run: pnpm check

      - name: Run tests
        if: steps.outdated.outputs.has_updates == 'true'
        env:
          RESEND_API_KEY: dummy_key_for_ci
          DATABASE_URL: mysql://dummy:dummy@localhost:3306/dummy
          JWT_SECRET: ci-test-secret
          VITE_APP_ID: ci-test-app
          OAUTH_SERVER_URL: https://localhost
          VITE_OAUTH_PORTAL_URL: https://localhost
          BUILT_IN_FORGE_API_URL: https://localhost
          BUILT_IN_FORGE_API_KEY: ci-test-key
        run: pnpm test

      - name: Create Pull Request
        if: steps.outdated.outputs.has_updates == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update dependencies'
          title: 'chore: Weekly dependency updates'
          body: |
            ## Dependency Updates
            
            This PR contains automated dependency updates.
            
            ### Changes
            - Updated patch and minor versions
            - All tests passing
            
            ### Review Checklist
            - [ ] Check for breaking changes
            - [ ] Review changelog of major updates
            - [ ] Test locally if needed
            
            Auto-generated by GitHub Actions
          branch: chore/dependency-updates
          delete-branch: true
          labels: dependencies, automated

  security-updates:
    name: Security Updates
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run security audit
        id: audit
        run: |
          pnpm audit --audit-level=critical > audit-output.txt 2>&1 || true
          if grep -q "critical" audit-output.txt 2>/dev/null; then
            echo "has_vulnerabilities=true" >> $GITHUB_OUTPUT
          else
            echo "has_vulnerabilities=false" >> $GITHUB_OUTPUT
          fi

      - name: Attempt to fix security vulnerabilities
        if: steps.audit.outputs.has_vulnerabilities == 'true'
        continue-on-error: true
        run: |
          pnpm update --latest --interactive=false
          pnpm install

      - name: Run type check after fixes
        if: steps.audit.outputs.has_vulnerabilities == 'true'
        continue-on-error: true
        run: pnpm check

      - name: Run tests after fixes
        if: steps.audit.outputs.has_vulnerabilities == 'true'
        continue-on-error: true
        env:
          RESEND_API_KEY: dummy_key_for_ci
          DATABASE_URL: mysql://dummy:dummy@localhost:3306/dummy
          JWT_SECRET: ci-test-secret
          VITE_APP_ID: ci-test-app
          OAUTH_SERVER_URL: https://localhost
          VITE_OAUTH_PORTAL_URL: https://localhost
          BUILT_IN_FORGE_API_URL: https://localhost
          BUILT_IN_FORGE_API_KEY: ci-test-key
        run: pnpm test

      - name: Create Security PR
        if: steps.audit.outputs.has_vulnerabilities == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'security: fix vulnerabilities'
          title: 'Security: Fix vulnerabilities'
          body: |
            ## Security Updates
            
            This PR contains automated security fixes.
            
            ### Changes
            - Fixed security vulnerabilities
            - Type check and tests run (may have warnings)
            
            ### Priority
            **High Priority** - Contains security fixes
            
            Auto-generated by GitHub Actions
          branch: security/vulnerability-fixes
          delete-branch: true
          labels: security, automated, high-priority
